<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>後台管理</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

        /* Login */
        .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #fff; border-radius: 12px; padding: 40px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); width: 360px; }
        .login-card h1 { font-size: 1.3rem; margin-bottom: 20px; text-align: center; }
        .login-card input { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 12px; font-size: 1rem; }
        .login-card button { width: 100%; padding: 10px; background: #333; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .login-card button:hover { background: #555; }
        .login-error { color: #e63946; font-size: 0.85rem; margin-top: 8px; display: none; text-align: center; }

        /* Dashboard */
        .dashboard { display: none; }
        .topbar { background: #fff; padding: 16px 24px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .topbar h1 { font-size: 1.1rem; }
        .topbar-actions { display: flex; gap: 10px; }
        .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .btn-primary { background: #333; color: #fff; }
        .btn-primary:hover { background: #555; }
        .btn-danger { background: #e63946; color: #fff; }
        .btn-danger:hover { background: #c1121f; }
        .btn-outline { background: #fff; border: 1px solid #ddd; color: #333; }
        .btn-outline:hover { background: #f0f0f0; }

        .content { max-width: 960px; margin: 24px auto; padding: 0 16px; }

        /* Works Table */
        .works-table { width: 100%; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .works-table th, .works-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .works-table th { background: #fafafa; font-weight: 600; font-size: 0.85rem; color: #999; }
        .works-table td { font-size: 0.9rem; }
        .works-table .thumb-cell img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; }
        .status-badge { padding: 3px 10px; border-radius: 12px; font-size: 0.8rem; }
        .status-published { background: #d4edda; color: #155724; }
        .status-draft { background: #f0f0f0; color: #999; }
        .sort-handle { cursor: grab; color: #ccc; font-size: 1.2rem; }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 32px; width: 560px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
        .modal h2 { font-size: 1.2rem; margin-bottom: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 6px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 14px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .checkbox-group { display: flex; align-items: center; gap: 8px; }
        .checkbox-group input { width: auto; }

        /* Image Upload */
        .image-upload-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid #eee; }
        .uploaded-images { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
        .uploaded-img { position: relative; }
        .uploaded-img img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; }
        .uploaded-img .remove-img { position: absolute; top: -6px; right: -6px; background: #e63946; color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; cursor: pointer; }
        .upload-row { display: flex; gap: 8px; align-items: flex-end; }
        .upload-row select { width: 120px; }

        /* Settings Panel */
        .settings-panel { background: #fff; border-radius: 10px; padding: 24px; margin-bottom: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .settings-panel h3 { font-size: 1rem; margin-bottom: 16px; }
        .settings-row { display: flex; gap: 12px; align-items: flex-end; }
        .settings-row .form-group { flex: 1; margin-bottom: 0; }

        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
    </style>
</head>
<body>
    <!-- Login -->
    <div id="admin-login" class="login-wrap">
        <div class="login-card">
            <h1>後台登入</h1>
            <form id="login-form">
                <input type="password" id="admin-password" placeholder="管理員密碼" autocomplete="off">
                <button type="submit">登入</button>
            </form>
            <p id="login-error" class="login-error">密碼錯誤</p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="dashboard">
        <div class="topbar">
            <h1>後台管理</h1>
            <div class="topbar-actions">
                <button class="btn btn-outline" id="btn-settings">設定</button>
                <button class="btn btn-primary" id="btn-add-work">新增作品</button>
                <button class="btn btn-outline" id="btn-logout">登出</button>
            </div>
        </div>

        <div class="content">
            <!-- Settings (hidden by default) -->
            <div id="settings-section" style="display:none;">
                <div class="settings-panel">
                    <h3>前台解鎖密碼</h3>
                    <div class="settings-row">
                        <div class="form-group">
                            <input type="text" id="unlock-password-input" placeholder="輸入新密碼">
                        </div>
                        <button class="btn btn-primary" id="btn-save-password">儲存</button>
                    </div>
                </div>
            </div>

            <!-- Works List -->
            <div id="works-section">
                <table class="works-table">
                    <thead>
                        <tr>
                            <th style="width:40px;"></th>
                            <th style="width:60px;">縮圖</th>
                            <th>作品名</th>
                            <th>價格</th>
                            <th>狀態</th>
                            <th style="width:140px;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="works-tbody"></tbody>
                </table>
                <div id="works-empty" class="empty-state" style="display:none;">
                    <p>尚無作品，點「新增作品」開始建立。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Work Form Modal -->
    <div id="work-modal" class="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">新增作品</h2>
            <form id="work-form">
                <input type="hidden" id="work-id">
                <div class="form-group">
                    <label>作品名</label>
                    <input type="text" id="work-title" required>
                </div>
                <div class="form-group">
                    <label>價格</label>
                    <input type="text" id="work-price" placeholder="例：NT$ 500">
                </div>
                <div class="form-group">
                    <label>內文</label>
                    <textarea id="work-content"></textarea>
                </div>
                <div class="form-group">
                    <label>排序</label>
                    <input type="number" id="work-sort" value="0">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="work-published">
                    <label for="work-published">發布</label>
                </div>

                <!-- Image Upload (only for existing works) -->
                <div id="image-upload-section" class="image-upload-section" style="display:none;">
                    <h3 style="font-size:0.95rem;margin-bottom:12px;">圖片管理</h3>
                    <div id="uploaded-images" class="uploaded-images"></div>
                    <p style="font-size:0.8rem;color:#999;margin-bottom:8px;">上傳原圖（可多選），系統自動產生縮圖與預覽圖。</p>
                    <div class="upload-row" style="margin-top:12px;">
                        <div class="form-group" style="margin-bottom:0;flex:1;">
                            <input type="file" id="image-file" accept="image/*" multiple>
                        </div>
                        <button type="button" class="btn btn-outline" id="btn-upload-image">上傳</button>
                    </div>
                    <div id="upload-progress" style="margin-top:8px;font-size:0.8rem;color:#999;"></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-outline" id="btn-cancel">取消</button>
                    <button type="submit" class="btn btn-primary">儲存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js?v=5"></script>
</body>
</html>
